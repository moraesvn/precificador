services:
  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: precificador-auth-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INTERNAL_JOB_TOKEN: ${INTERNAL_JOB_TOKEN:-}
      SP_TINY_CLIENT_ID: ${SP_TINY_CLIENT_ID:-}
      SP_TINY_CLIENT_SECRET: ${SP_TINY_CLIENT_SECRET:-}
      SP_TINY_REDIRECT_URI: ${SP_TINY_REDIRECT_URI:-}
      SC_TINY_CLIENT_ID: ${SC_TINY_CLIENT_ID:-}
      SC_TINY_CLIENT_SECRET: ${SC_TINY_CLIENT_SECRET:-}
      SC_TINY_REDIRECT_URI: ${SC_TINY_REDIRECT_URI:-}
      SP_ML_CLIENT_ID: ${SP_ML_CLIENT_ID:-}
      SP_ML_CLIENT_SECRET: ${SP_ML_CLIENT_SECRET:-}
      SP_ML_REDIRECT_URI: ${SP_ML_REDIRECT_URI:-}
      SP_ML_AUTH_URL: ${SP_ML_AUTH_URL:-}
      SP_ML_TOKEN_URL: ${SP_ML_TOKEN_URL:-}
    ports:
      - "127.0.0.1:8000:8000"
